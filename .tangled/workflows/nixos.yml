when:
  - event: ["push", "pull_request"]
    branch: ["main", "test"]

dependencies:
  nixpkgs:
    - lix

steps:
  - name: Disable nix sandbox
    command: |
      echo "sandbox = false" >> /etc/nix/nix.conf
    # Warning: do not cache derivations that are built without the sandbox...
    # This also means that when this is removed we will need to clean out whatever derivations were built here to avoid them being reused and cached
  - name: Build all systems
    command: |
      rm -rf /homeless-shelter # Clean the homeless-shelter directory to help with unsandboxed build purity
      nix build -f ./nilla.nix packages.allNixOSSystems.result.x86_64-linux --show-trace
  - name: Build all homes
    command: |
      rm -rf /homeless-shelter # Clean the homeless-shelter directory to help with unsandboxed build purity
      nix build -f ./nilla.nix packages.allHomes.result.x86_64-linux --show-trace
